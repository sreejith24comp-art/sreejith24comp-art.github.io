{% extends 'base.html' %}

{% block title %}Login / Register{% endblock %}

{% block content %}
<div class="min-h-full flex items-center justify-center pt-10 pb-10">
    <div id="auth-card" class="card w-full max-w-sm p-8 space-y-6 text-center">
        
        <h2 id="auth-title" class="text-3xl font-extrabold text-black uppercase tracking-wider">
            {% if show_register %}CREATE ACCOUNT{% else %}USER LOGIN{% endif %}
        </h2>

        <!-- Login Form -->
        <form id="login-form" method="POST" action="{{ url_for('index') }}" 
              class="space-y-4 {% if show_register %}hidden{% endif %}">
            <input type="hidden" name="action" value="login">
            <input type="text" name="username" placeholder="enter username" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-gray-100 text-gray-700">
            <input type="password" name="password" placeholder="enter password" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-gray-100 text-gray-700">
            
            <div class="flex items-center justify-start text-sm pt-2">
                <input id="remember-me" name="remember-me" type="checkbox"
                       class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded">
                <label for="remember-me" class="ml-2 block text-gray-900">
                    remember password
                </label>
            </div>

            <button type="submit"
                    class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-lg shadow-md transition duration-150 transform hover:scale-[1.01] uppercase tracking-wider">
                LOGIN
            </button>
            <p class="text-sm text-purple-600 cursor-pointer hover:text-purple-800 transition" onclick="toggleAuthForm(true)">
                create account
            </p>
        </form>

        <!-- Register Form -->
        <form id="register-form" method="POST" action="{{ url_for('index') }}" 
              class="space-y-4 {% if not show_register %}hidden{% endif %}">
            <input type="hidden" name="action" value="register">
            <input type="text" name="username" placeholder="enter username" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-gray-100 text-gray-700">
            <input type="email" name="email" placeholder="enter email" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-gray-100 text-gray-700">
            <input type="password" name="password" placeholder="enter password" required
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 bg-gray-100 text-gray-700">

            <button type="submit"
                    class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-lg shadow-md transition duration-150 transform hover:scale-[1.01] uppercase tracking-wider">
                CREATE
            </button>
            <p class="text-sm text-purple-600 cursor-pointer hover:text-purple-800 transition" onclick="toggleAuthForm(false)">
                Login
            </p>
        </form>
    </div>
</div>

<script>
    function toggleAuthForm(showRegister) {
        document.getElementById('auth-title').textContent = showRegister ? 'CREATE ACCOUNT' : 'USER LOGIN';
        document.getElementById('login-form').classList.toggle('hidden', showRegister);
        document.getElementById('register-form').classList.toggle('hidden', !showRegister);
    }

    // Set initial state based on backend context
    document.addEventListener('DOMContentLoaded', () => {
        // Jinja logic to set initial state
        const showRegister = "{{ show_register }}" === "True";
        toggleAuthForm(showRegister);
    });
</script>
{% endblock %}
